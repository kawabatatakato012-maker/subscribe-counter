<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Subscribe Counter Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: transparent !important;
    margin: 0; overflow: hidden;
    width: 460px; height: 380px;
  }
  #flash { position: fixed; inset: 0; opacity: 0; pointer-events: none; z-index: 200; background: transparent; }
  #confetti-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 150; background: transparent; }
  #notif {
    position: fixed; top: 6px; left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: #d4b84a; color: #0a0a1a;
    font-size: 13px; font-weight: 800;
    padding: 7px 20px; border-radius: 20px;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
    opacity: 0; pointer-events: none; white-space: nowrap; z-index: 300;
  }
  #notif.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>
<div id="flash"></div>
<div id="confetti-wrap"></div>
<div id="notif"></div>

<svg width="460" height="380" viewBox="0 0 460 380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="pg" cx="42%" cy="38%" r="62%">
    <stop offset="0%" stop-color="#1a1d58"/>
    <stop offset="50%" stop-color="#0c0c2c"/>
    <stop offset="100%" stop-color="#060614"/>
  </radialGradient>
  <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="rgba(180,155,55,0.1)"/>
    <stop offset="20%"  stop-color="rgba(200,175,70,0.6)"/>
    <stop offset="50%"  stop-color="rgba(230,200,95,0.95)"/>
    <stop offset="80%"  stop-color="rgba(200,175,70,0.6)"/>
    <stop offset="100%" stop-color="rgba(180,155,55,0.1)"/>
  </linearGradient>
  <linearGradient id="pillg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#7799ff"/>
    <stop offset="30%"  stop-color="#aaddff"/>
    <stop offset="60%"  stop-color="#88ffdd"/>
    <stop offset="100%" stop-color="#ccaaff"/>
  </linearGradient>
  <linearGradient id="pillsheen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="rgba(255,255,255,0.55)"/>
    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
  </linearGradient>
  <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow5" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="tglow" x="-15%" y="-15%" width="130%" height="130%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <clipPath id="cpTop"><rect x="0" y="0" width="460" height="182"/></clipPath>
  <clipPath id="cpBottom"><rect x="0" y="182" width="460" height="198"/></clipPath>
</defs>

<ellipse cx="210" cy="182" rx="168" ry="48" transform="rotate(-20,210,182)"
  fill="none" stroke="url(#rg)" stroke-width="2.5" filter="url(#glow2)" opacity="0.65" clip-path="url(#cpTop)"/>
<ellipse cx="210" cy="182" rx="122" ry="116" fill="url(#pg)" stroke="rgba(160,140,55,0.45)" stroke-width="1.5"/>
<text x="210" y="206" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="900" fill="rgba(212,184,74,0.3)" letter-spacing="-3">
  <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  <tspan id="countGlow">0</tspan>
</text>
<text id="countNum" x="210" y="206" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="900" fill="#d4b84a" letter-spacing="-3" filter="url(#tglow)">0</text>
<ellipse cx="210" cy="182" rx="168" ry="48" transform="rotate(-20,210,182)"
  fill="none" stroke="url(#rg)" stroke-width="2.5" filter="url(#glow2)" opacity="0.95" clip-path="url(#cpBottom)"/>
<text x="210" y="206" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="900" fill="rgba(212,184,74,0.28)" letter-spacing="-3">
  <animate attributeName="opacity" values="0.28;0.6;0.28" dur="2.5s" repeatCount="indefinite"/>
  <tspan id="countGlow2">0</tspan>
</text>
<text id="countNum2" x="210" y="206" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="900" fill="#d4b84a" letter-spacing="-3" filter="url(#tglow)">0</text>

<g transform="translate(92,252)" filter="url(#glow5)">
  <polygon points="0,-18 4,-5 16,0 4,5 0,18 -4,5 -16,0 -4,-5" fill="#8aabee">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2.2s" repeatCount="indefinite"/></polygon>
  <circle r="3" fill="white"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite"/></circle>
  <line x1="-22" y1="0" x2="22" y2="0" stroke="rgba(160,190,255,0.6)" stroke-width="1.2">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.2s" repeatCount="indefinite"/></line>
</g>
<g transform="translate(338,98)" filter="url(#glow5)">
  <polygon points="0,-28 3,-5 10,0 3,5 0,28 -3,5 -10,0 -3,-5" fill="#aaccff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.8s" repeatCount="indefinite"/></polygon>
  <polygon points="0,-8 5,0 0,8 -5,0" fill="white">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/></polygon>
  <line x1="-18" y1="0" x2="18" y2="0" stroke="rgba(180,210,255,0.5)" stroke-width="1">
    <animate attributeName="opacity" values="0;0.6;0" dur="1.8s" repeatCount="indefinite"/></line>
  <line x1="0" y1="-30" x2="0" y2="30" stroke="rgba(180,210,255,0.5)" stroke-width="1">
    <animate attributeName="opacity" values="0;0.6;0" dur="1.8s" repeatCount="indefinite"/></line>
</g>
<g transform="translate(168,262) rotate(-8)">
  <rect x="-54" y="-14" width="108" height="28" rx="14" fill="url(#pillg)"/>
  <rect x="-54" y="-14" width="108" height="13" rx="14" fill="url(#pillsheen)">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.2s" repeatCount="indefinite"/></rect>
  <text x="0" y="5" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="800" fill="#001828" letter-spacing="0.5">subscribe</text>
</g>
<text id="goalNum" x="358" y="306" font-family="'Helvetica Neue',Arial,sans-serif" font-size="38" font-weight="900" fill="#d4b84a" letter-spacing="-1" filter="url(#tglow)">100</text>
</svg>

<script>
  let count = 0, goal = 100, prevCount = 0;
  const countEls = ['countNum','countNum2'].map(id=>document.getElementById(id));
  const glowEls  = ['countGlow','countGlow2'].map(id=>document.getElementById(id));
  const goalEl   = document.getElementById('goalNum');
  const flashEl  = document.getElementById('flash');
  const notifEl  = document.getElementById('notif');

  function updateDisplay() {
    countEls.forEach(el=>el&&(el.textContent=count));
    glowEls.forEach(el=>el&&(el.textContent=count));
    goalEl.textContent=goal;
  }
  function flashScreen(c) {
    flashEl.style.background=c; flashEl.style.opacity='0.75';
    setTimeout(()=>flashEl.style.opacity='0.2',80);
    setTimeout(()=>flashEl.style.opacity='0',200);
  }
  function showNotif(t) {
    notifEl.textContent=t; notifEl.classList.add('show');
    setTimeout(()=>notifEl.classList.remove('show'),2500);
  }
  function spawnConfetti() {
    const wrap=document.getElementById('confetti-wrap');
    const cols=['#d4b84a','#ffe566','#aaddff','#88ffcc','#ff88cc','#fff'];
    for(let i=0;i<22;i++){
      const sz=5+Math.random()*9,dx=-70+Math.random()*140,dy=100+Math.random()*110,rot=Math.random()*720-360;
      const id='cf'+Date.now()+i;
      const ks=document.createElement('style');
      ks.textContent=`@keyframes ${id}{to{transform:translate(${dx}px,${dy}px) rotate(${rot}deg);opacity:0;}}`;
      document.head.appendChild(ks);
      const d=document.createElement('div');
      d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'2px'};left:${20+Math.random()*60}%;top:${15+Math.random()*35}%;animation:${id} 1.5s ease-out forwards;`;
      wrap.appendChild(d); setTimeout(()=>{d.remove();ks.remove();},1600);
    }
  }
  function animateBump(up) {
    let s=1,phase=true;
    const t=setInterval(()=>{
      s=up?(phase?s+0.07:s-0.05):(phase?s-0.05:s+0.04);
      if(up&&s>=1.55)phase=false; if(!up&&s<=0.72)phase=false;
      if(up&&!phase&&s<=1.0){clearInterval(t);s=1;}
      if(!up&&!phase&&s>=1.0){clearInterval(t);s=1;countEls.forEach(el=>el&&(el.style.fill='#d4b84a'));}
      countEls.forEach(el=>el&&el.setAttribute('transform',`translate(210,0) scale(${s.toFixed(3)}) translate(-210,0)`));
      if(!up)countEls.forEach(el=>el&&(el.style.fill=phase?'#ff6666':'#d4b84a'));
    },16);
    setTimeout(()=>countEls.forEach(el=>el&&(el.setAttribute('transform',''),el.style.fill='#d4b84a')),550);
  }

  function applyUpdate(newCount, newGoal) {
    prevCount = count;
    if(typeof newCount==='number') count=newCount;
    if(typeof newGoal==='number')  goal=newGoal;
    updateDisplay();
    if(count>prevCount){
      animateBump(true); flashScreen('rgba(212,184,74,0.55)'); spawnConfetti();
      showNotif('+ サブスク登録！ '+count);
      if(prevCount<goal&&count>=goal) setTimeout(()=>{flashScreen('rgba(255,255,255,0.92)');showNotif('目標達成！ おめでとう！');},400);
    } else if(count<prevCount){
      animateBump(false); flashScreen('rgba(255,60,60,0.4)');
      showNotif('サブスク解除 '+count);
    }
  }

  // /api/state を2秒ごとにポーリングして差分を反映
  async function poll() {
    try {
      const r = await fetch('/api/state');
      const d = await r.json();
      if (d.count !== count || d.goal !== goal) {
        applyUpdate(d.count, d.goal);
      }
    } catch(e) {}
    setTimeout(poll, 2000);
  }

  updateDisplay();
  poll();
</script>
</body>
</html>
