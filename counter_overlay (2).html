<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Subscribe Counter Overlay</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent !important; overflow: hidden; width: 460px; height: 380px; }
  #flash { position: fixed; inset: 0; opacity: 0; pointer-events: none; z-index: 200; }
  #confetti-wrap { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 150; }
  #notif {
    position: fixed; top: 6px; left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: #d4b84a; color: #0a0a1a;
    font-size: 13px; font-weight: 800;
    padding: 7px 20px; border-radius: 20px;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s;
    opacity: 0; pointer-events: none; white-space: nowrap; z-index: 300;
  }
  #notif.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>
<div id="flash"></div>
<div id="confetti-wrap"></div>
<div id="notif"></div>

<svg width="460" height="380" viewBox="0 0 460 380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Planet gradient -->
  <radialGradient id="pg" cx="40%" cy="35%" r="65%">
    <stop offset="0%" stop-color="#1e2268"/>
    <stop offset="45%" stop-color="#0c0c2c"/>
    <stop offset="100%" stop-color="#060614"/>
  </radialGradient>

  <!-- Sheen: bright specular highlight -->
  <radialGradient id="sheenA" cx="32%" cy="26%" r="30%">
    <stop offset="0%" stop-color="rgba(255,255,255,0.55)">
      <animate attributeName="stop-opacity" values="0.55;0.85;0.55" dur="2.8s" repeatCount="indefinite"/>
    </stop>
    <stop offset="60%" stop-color="rgba(200,215,255,0.15)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
  </radialGradient>

  <!-- Ring gradient -->
  <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="rgba(180,150,50,0.15)"/>
    <stop offset="25%"  stop-color="rgba(215,190,80,0.8)"/>
    <stop offset="50%"  stop-color="rgba(235,205,100,1)"/>
    <stop offset="75%"  stop-color="rgba(215,190,80,0.8)"/>
    <stop offset="100%" stop-color="rgba(180,150,50,0.15)"/>
  </linearGradient>

  <!-- Pill gradient -->
  <linearGradient id="pillg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%"   stop-color="#8899ff"/>
    <stop offset="35%"  stop-color="#aaddff"/>
    <stop offset="65%"  stop-color="#88ffdd"/>
    <stop offset="100%" stop-color="#ccaaff"/>
  </linearGradient>
  <linearGradient id="pillsheen" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%"   stop-color="rgba(255,255,255,0.6)"/>
    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
  </linearGradient>

  <!-- Glow filters -->
  <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow4" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow6" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="tglow" x="-15%" y="-15%" width="130%" height="130%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ===== ORBIT RING BACK ===== -->
<g transform="translate(210,188)">
  <path d="M -158,20 A 168,54 0 0 1 158,-20"
    fill="none" stroke="url(#rg)" stroke-width="2.5" filter="url(#glow2)" opacity="0.7"/>
</g>

<!-- ===== PLANET ===== -->
<ellipse cx="210" cy="182" rx="122" ry="116" fill="url(#pg)" stroke="rgba(160,140,55,0.45)" stroke-width="1.5"/>

<!-- Sheen highlight (breathing radial glow) -->
<ellipse cx="210" cy="182" rx="122" ry="116" fill="url(#sheenA)"/>

<!-- Secondary inner sheen sweep -->
<ellipse cx="188" cy="148" rx="58" ry="40" fill="none"
  stroke="rgba(200,215,255,0.13)" stroke-width="18">
  <animate attributeName="opacity" values="0.35;1;0.35" dur="3.5s" repeatCount="indefinite"/>
  <animate attributeName="rx" values="58;70;58" dur="3.5s" repeatCount="indefinite"/>
  <animate attributeName="ry" values="40;48;40" dur="3.5s" repeatCount="indefinite"/>
</ellipse>

<!-- ===== COUNT NUMBER ===== -->
<!-- Glow layer -->
<text x="210" y="206" text-anchor="middle"
  font-family="'Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="900"
  fill="rgba(212,184,74,0.3)" letter-spacing="-3">
  <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
  <tspan id="countGlow">0</tspan>
</text>
<!-- Main number -->
<text id="countNum" x="210" y="206" text-anchor="middle"
  font-family="'Helvetica Neue',Arial,sans-serif" font-size="80" font-weight="900"
  fill="#d4b84a" letter-spacing="-3" filter="url(#tglow)">0</text>

<!-- ===== ORBIT RING FRONT ===== -->
<g transform="translate(210,188)">
  <path id="orbitPath" d="M -158,20 A 168,54 0 0 0 158,-20"
    fill="none" stroke="url(#rg)" stroke-width="2.5" filter="url(#glow2)" opacity="0.95"/>
  <!-- Orbiting glow dot -->
  <circle r="5" fill="#ffe090" filter="url(#glow6)">
    <animateMotion dur="5.5s" repeatCount="indefinite">
      <mpath href="#orbitPath"/>
    </animateMotion>
  </circle>
</g>

<!-- ===== SUBSCRIBE PILL ===== -->
<g transform="translate(158,258) rotate(-4)">
  <rect x="-55" y="-14" width="110" height="28" rx="14" fill="url(#pillg)"/>
  <rect x="-55" y="-14" width="110" height="14" rx="14" fill="url(#pillsheen)">
    <animate attributeName="opacity" values="0.8;0.35;0.8" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="0" y="5" text-anchor="middle"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="12" font-weight="800" fill="#001828" letter-spacing="0.5">subscribe</text>
</g>

<!-- ===== GOAL NUMBER (closer to planet, right side) ===== -->
<text id="goalNum" x="352" y="302"
  font-family="'Helvetica Neue',Arial,sans-serif" font-size="38" font-weight="900"
  fill="#d4b84a" letter-spacing="-1" filter="url(#tglow)">100</text>

<!-- ===== STARS ===== -->
<!-- Top-right big star -->
<g transform="translate(338,95)" filter="url(#glow4)">
  <polygon points="0,-18 4.3,-5.9 17,-5.9 7,2.2 11,14.5 0,8 -11,14.5 -7,2.2 -17,-5.9 -4.3,-5.9"
    fill="#aaccff">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.9s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.28;1" dur="1.9s" repeatCount="indefinite"/>
  </polygon>
  <circle r="3.5" fill="white">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.9s" repeatCount="indefinite"/>
  </circle>
</g>
<!-- Cross sparkle on big star -->
<g transform="translate(338,95)" opacity="0.9">
  <line x1="-22" y1="0" x2="22" y2="0" stroke="rgba(180,210,255,0.7)" stroke-width="1">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.9s" repeatCount="indefinite"/>
  </line>
  <line x1="0" y1="-22" x2="0" y2="22" stroke="rgba(180,210,255,0.7)" stroke-width="1">
    <animate attributeName="opacity" values="0;0.7;0" dur="1.9s" repeatCount="indefinite"/>
  </line>
</g>

<!-- Bottom-left smaller star -->
<g transform="translate(88,252)" filter="url(#glow4)">
  <polygon points="0,-13 3.1,-4.2 12,-4.2 5,1.6 7.8,10.5 0,5.8 -7.8,10.5 -5,1.6 -12,-4.2 -3.1,-4.2"
    fill="#99bbff">
    <animate attributeName="opacity" values="1;0.35;1" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
  <circle r="2.5" fill="white">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</g>


<!-- ===== PROGRESS ARC ===== -->
<path id="progressArc" d="" fill="none" stroke="#d4b84a" stroke-width="3"
  stroke-linecap="round" opacity="0.55"/>

</svg>

<script>
  let count = 0, goal = 100;

  const countEl   = document.getElementById('countNum');
  const countGlow = document.getElementById('countGlow');
  const goalEl    = document.getElementById('goalNum');
  const flashEl   = document.getElementById('flash');
  const notifEl   = document.getElementById('notif');
  const arcEl     = document.getElementById('progressArc');

  function updateDisplay() {
    countEl.textContent  = count;
    countGlow.textContent = count;
    goalEl.textContent   = goal;
    updateArc();
  }

  function updateArc() {
    const pct = Math.min(1, count / goal);
    if (pct <= 0) { arcEl.setAttribute('d',''); return; }
    const cx=210,cy=182,rx=128,ry=122;
    const sa = Math.PI*0.75, ea = sa + pct*Math.PI*1.5;
    const x1=cx+rx*Math.cos(sa), y1=cy+ry*Math.sin(sa);
    const x2=cx+rx*Math.cos(ea), y2=cy+ry*Math.sin(ea);
    const lg = pct>0.666?1:0;
    arcEl.setAttribute('d',`M${x1.toFixed(1)},${y1.toFixed(1)} A${rx},${ry} 0 ${lg},1 ${x2.toFixed(1)},${y2.toFixed(1)}`);
  }

  function flashScreen(c) {
    flashEl.style.background = c; flashEl.style.opacity='0.75';
    setTimeout(()=>{ flashEl.style.opacity='0.2'; },80);
    setTimeout(()=>{ flashEl.style.opacity='0'; },200);
  }

  function showNotif(t) {
    notifEl.textContent=t; notifEl.classList.add('show');
    setTimeout(()=>notifEl.classList.remove('show'),2500);
  }

  function spawnConfetti() {
    const wrap=document.getElementById('confetti-wrap');
    const cols=['#d4b84a','#ffe566','#aaddff','#88ffcc','#ff88cc','#fff'];
    for(let i=0;i<22;i++){
      const d=document.createElement('div');
      const sz=5+Math.random()*9, dx=-70+Math.random()*140, dy=100+Math.random()*110, rot=Math.random()*720-360;
      const id='cf'+Date.now()+i;
      const ks=document.createElement('style');
      ks.textContent=`@keyframes ${id}{to{transform:translate(${dx}px,${dy}px) rotate(${rot}deg);opacity:0;}}`;
      document.head.appendChild(ks);
      d.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};border-radius:${Math.random()>.5?'50%':'2px'};left:${20+Math.random()*60}%;top:${15+Math.random()*35}%;animation:${id} 1.5s ease-out forwards;`;
      wrap.appendChild(d); setTimeout(()=>{d.remove();ks.remove();},1600);
    }
  }

  function animateBump(up) {
    let s=1, phase=true;
    const t=setInterval(()=>{
      s = up ? (phase?s+0.07:s-0.05) : (phase?s-0.05:s+0.04);
      if(up && s>=1.55) phase=false;
      if(!up && s<=0.72) phase=false;
      if(up && !phase && s<=1.0){ clearInterval(t); s=1; }
      if(!up && !phase && s>=1.0){ clearInterval(t); s=1; countEl.style.fill='#d4b84a'; }
      countEl.setAttribute('transform',`translate(210,0) scale(${s.toFixed(3)}) translate(-210,0)`);
      if(!up) countEl.style.fill = phase?'#ff6666':'#d4b84a';
    },16);
    setTimeout(()=>{ countEl.setAttribute('transform',''); countEl.style.fill='#d4b84a'; },550);
  }

  function applyState(state) {
    const nc=state.count??count, ng=state.goal??goal;
    const inc=nc>count, dec=nc<count, wasGoal=count<ng&&nc>=ng;
    count=nc; goal=ng;
    updateDisplay();
    if(inc){
      animateBump(true);
      flashScreen('rgba(212,184,74,0.55)');
      spawnConfetti();
      showNotif('+ サブスク登録！ '+count);
      if(wasGoal) setTimeout(()=>{ flashScreen('rgba(255,255,255,0.92)'); showNotif('目標達成！ おめでとう！'); },400);
    } else if(dec){
      animateBump(false);
      flashScreen('rgba(255,60,60,0.4)');
      showNotif('サブスク解除 '+count);
    }
  }

  function loadFromStorage() {
    try {
      const raw=localStorage.getItem('sub_counter_state');
      if(raw){ const s=JSON.parse(raw); count=s.count??0; goal=s.goal??100; updateDisplay(); }
    } catch(e){}
  }

  loadFromStorage();
  window.addEventListener('storage', e=>{
    if(e.key==='sub_counter_state') try{ applyState(JSON.parse(e.newValue)); }catch(err){}
  });
</script>
</body>
</html>
